spring:
  application:
    name: vault

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://aws-1-eu-west-2.pooler.supabase.com:5432/postgres
    username: postgres.bsbypoyjtusgcpjtfrdy
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: UUID

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080
  address: 0.0.0.0

logging:
  level:
    com.vfa.vault: DEBUG
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: method
