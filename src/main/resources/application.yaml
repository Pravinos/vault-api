spring:
  application:
    name: vault

  config:
    import: optional:file:.env.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  task:
    scheduling:
      enabled: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:lm-studio}
      lmstudio:
        base-url: http://localhost:1234/v1
        api-key: lm-studio
        chat:
          model: mistral-7b-instruct
          options:
            temperature: 0.3
      groq:
        base-url: https://api.groq.com/openai/v1
        api-key: ${GROQ_API_KEY:}
        chat:
          model: llama3-70b-8192
          options:
            temperature: 0.3

server:
  port: ${PORT:8080}
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: method

vault:
  allowed-origins:
    - https://vault-frontend-lake.vercel.app
    - http://localhost:3000
    - https://laptopakis.tail2e7f53.ts.net
  auth:
    jwt-secret: ${VAULT_JWT_SECRET:please-change-this-secret-to-something-long}
    jwt-expiry-hours: 24
    cookie-name: vault_token
  ai:
    system-prompt: |
      You are Vault, a personal finance assistant. You have access to the
      user's real expense, income, account, and goal data through function calls.
      Always base your answers on the actual data. Be concise, practical, and
      friendly. When currency amounts are shown, use the € symbol.
