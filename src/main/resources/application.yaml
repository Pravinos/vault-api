spring:
  application:
    name: vault

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://aws-1-eu-west-2.pooler.supabase.com:6543/postgres
    username: postgres.bsbypoyjtusgcpjtfrdy
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: UUID

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:lm-studio}
      lmstudio:
        base-url: http://localhost:1234/v1
        api-key: lm-studio
        chat:
          model: mistral-7b-instruct
          options:
            temperature: 0.3
      groq:
        base-url: https://api.groq.com/openai/v1
        api-key: ${GROQ_API_KEY:}
        chat:
          model: llama3-70b-8192
          options:
            temperature: 0.3

server:
  port: ${PORT:8080}
  address: 0.0.0.0

logging:
  level:
    com.vfa.vault: DEBUG
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: method

vault:
  ai:
    system-prompt: |
      You are Vault, a personal finance assistant. You have access to the
      user's real expense, income, account, and goal data through function calls.
      Always base your answers on the actual data. Be concise, practical, and
      friendly. When currency amounts are shown, use the € symbol.
